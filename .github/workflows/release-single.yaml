name: Release single device

on:
  # Called by release-multiple.yaml (cron matrix)
  workflow_call:
    inputs:
      device-id:
        type: string
      magisk-preinit-device:
        type: string
        default: ''
      magisk-pixin:
        description: Additionally build a flavor with the pixincreate Magisk fork (working zygisk)
        type: string
        default: 'false'
      skip-rootless:
        type: string
        default: ''
      skip-rooted:
        type: string
        default: ''

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:
    inputs:
      device-id:
        description: Device ID
        required: true
      magisk-preinit-device:
        description: Magisk preinit device
        required: false
      magisk-pixin:
        description: Also build pixincreate Magisk fork flavor (true/false)
        required: false
        type: boolean
      skip-rootless:
        description: skip building rootless OTA
        type: boolean
        required: false
      skip-rooted:
        description: skip building rooted (original Magisk) OTA
        type: boolean
        required: false
      upload-test-ota:
        description: Upload OTA to test folder
        required: false
        type: boolean
      force-build:
        description: Force artifacts to be built and uploaded to release if non-existing
        required: false
        type: boolean
      force-ota-server-upload:
        description: Force OTA server upload
        required: false
        type: boolean
      skip-release:
        description: Skip release (build only)
        required: false
        type: boolean
      ota-version:
        description: OTA version
        required: false
      magisk-version:
        description: Magisk version (original topjohnwu)
        required: false
      magisk-pixin-version:
        description: Magisk version (pixincreate fork)
        required: false

permissions:
  contents: write

jobs:
  build-device:
    runs-on: ubuntu-latest
    timeout-minutes: 30 # Make sure to not waste hours when some command does not return
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          # Allow for switching to gh-pages branch
          fetch-depth: 0
      - name: Set inputs
        # Empty means, use version defined in rooted-ota.sh
        # Note the difference between github.event.inputs (workflow_dispatch) and inputs (workflow_call)
        run: |
          echo "DEVICE_ID=$(echo '${{ github.event.inputs.device-id || inputs.device-id || 'shiba' }}' | xargs)" >> $GITHUB_ENV

          if [[ "${{ github.event.inputs.skip-rooted || inputs.skip-rooted }}" != "true" ]]; then
            echo "MAGISK_PREINIT_DEVICE=$(echo '${{ github.event.inputs.magisk-preinit-device || inputs.magisk-preinit-device || 'sda10' }}' | xargs)" >> $GITHUB_ENV
          fi

          echo "MAGISK_PIXIN=$(echo '${{ github.event.inputs.magisk-pixin || inputs.magisk-pixin || 'false' }}' | xargs)" >> $GITHUB_ENV
          echo "MAGISK_VERSION=$(echo '${{ github.event.inputs.magisk-version || '' }}' | xargs)" >> $GITHUB_ENV
          echo "MAGISK_PIXIN_VERSION=$(echo '${{ github.event.inputs.magisk-pixin-version || '' }}' | xargs)" >> $GITHUB_ENV
          echo "OTA_VERSION=$(echo '${{ github.event.inputs.ota-version || '' }}' | xargs)" >> $GITHUB_ENV
          echo "FORCE_OTA_SERVER_UPLOAD=$(echo '${{ github.event.inputs.force-ota-server-upload || '' }}' | xargs)" >> $GITHUB_ENV
          echo "FORCE_BUILD=$(echo '${{ github.event.inputs.force-build || '' }}' | xargs)" >> $GITHUB_ENV
          echo "UPLOAD_TEST_OTA=$(echo '${{ github.event.inputs.upload-test-ota || '' }}' | xargs)" >> $GITHUB_ENV
          echo "SKIP_ROOTLESS=$(echo '${{ github.event.inputs.skip-rootless || inputs.skip-rootless || '' }}' | xargs)" >> $GITHUB_ENV
          echo "SKIP_RELEASE=$(echo '${{ github.event.inputs.skip-release || '' }}' | xargs)" >> $GITHUB_ENV
      - run: sudo apt-get install -y jq curl git
      - name: release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPO: ${{ github.repository }}
          # Your own signing keys, stored as repository secrets
          KEY_AVB_BASE64: ${{ secrets.KEY_AVB_BASE64 }}
          KEY_OTA_BASE64: ${{ secrets.KEY_OTA_BASE64 }}
          CERT_OTA_BASE64: ${{ secrets.CERT_OTA_BASE64 }}
          PASSPHRASE_AVB: ${{ secrets.PASSPHRASE_AVB }}
          PASSPHRASE_OTA: ${{ secrets.PASSPHRASE_OTA }}
        run: |
          if [[ $SKIP_RELEASE == 'true' ]]; then
            DEBUG=1 bash -c '. rooted-ota.sh && createRootedOta && createOtaServerData'
          else
            DEBUG=1 bash -c '. rooted-ota.sh && createAndReleaseRootedOta'
          fi
