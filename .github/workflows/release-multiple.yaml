name: Release multiple devices

on:
  # Run daily. The build is skipped per device/flavor if that GrapheneOS version
  # is already released, so this only does real work when a new version drops.
  schedule:
    - cron: '0 3 * * *'

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

  # Allows calling from another workflow
  workflow_call:

permissions:
  contents: write

jobs:
  build-devices:
    strategy:
      # Don't cancel all devices if a single one fails
      fail-fast: false
      matrix:
        include:
          - device-id: blazer # Pixel 10 Pro
            magisk-preinit-device: sda10
          - device-id: comet # Pixel 9 Pro Fold
            magisk-preinit-device: sda10
          - device-id: frankel # Pixel 10
            magisk-preinit-device: sda10
          - device-id: tegu # Pixel 9a
            magisk-preinit-device: sda10
          - device-id: komodo # Pixel 9 Pro XL
            magisk-preinit-device: sda10
          - device-id: caiman # Pixel 9 Pro
            magisk-preinit-device: sda10
          - device-id: tokay # Pixel 9
            magisk-preinit-device: sda10
          - device-id: husky # Pixel 8 Pro
            magisk-preinit-device: sda10
          - device-id: shiba # Pixel 8
            magisk-preinit-device: sda10
          - device-id: akita # Pixel 8a
            magisk-preinit-device: sda10
          - device-id: bluejay # Pixel 6a
            magisk-preinit-device: sda8
          - device-id: cheetah # Pixel 7 Pro
            magisk-preinit-device: sda8
          - device-id: panther # Pixel 7
            magisk-preinit-device: sda8
          - device-id: lynx # Pixel 7a
            magisk-preinit-device: sda8
          - device-id: felix # Pixel Fold
            magisk-preinit-device: sda8
          - device-id: oriole # Pixel 6
            magisk-preinit-device: metadata
          - device-id: tangorpro # Pixel Tablet
            magisk-preinit-device: sda5
    uses: ./.github/workflows/release-single.yaml
    secrets: inherit
    with:
      device-id: ${{ matrix.device-id }}
      magisk-preinit-device: ${{ matrix.magisk-preinit-device }}
      # Build the pixincreate Magisk fork flavor (working zygisk) for every device,
      # in addition to the original topjohnwu Magisk and rootless flavors.
      magisk-pixin: 'true'
